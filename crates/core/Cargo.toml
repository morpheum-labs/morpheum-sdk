[package]
name = "morpheum-sdk-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "no_std core foundation for the Morpheum SDK — shared types, errors, traits, config, and builders"

[lib]
crate-type = ["lib"]

[features]
default = []
# Enables std support (required for native and some WASM features)
std = [
    "prost/std",
    "thiserror/std",
    "morpheum-signing-core/std",
    "morpheum-proto/std",
]
# Enables serde support for types (std-only)
serde = ["dep:serde", "morpheum-proto/serde"]
# Enables the ChainRegistryOps trait for VM-specific chain config loading
chain-registry = ["std", "dep:dirs-next"]
# WASM support (enables wasm-bindgen + tsify optional deps)
wasm = ["dep:wasm-bindgen", "dep:tsify"]
# Convenience feature for full std + all capabilities
full = ["std", "serde"]

[dependencies]
# Canonical protobuf definitions (generated from morpheum-proto)
morpheum-proto = { workspace = true }

# Official Morpheum signing core (no_std version) — deliberately used here
# instead of -native to keep sdk-core truly no_std and reusable.
# All signing, dynamic SignerInfo, TradingKeyClaim, and claim verification
# are delegated to this crate.
morpheum-signing-core = { workspace = true, default-features = false, features = [
    "dynamic-signer-info",
    "claim-verification",
] }

# Protobuf runtime (for Message::decode / encode_to_vec)
prost = { version = "0.14", default-features = false }

# Clean, zero-cost error handling
thiserror = { version = "2.0", default-features = false }

# Async traits for Transport and Client traits (zero-cost when not used)
async-trait = "0.1"

# Optional serialization (only enabled via "serde" feature)
serde = { version = "1.0", optional = true, default-features = false, features = ["derive"] }

# User config directory resolution (optional, for chain-registry feature)
dirs-next = { version = "2.0", optional = true }

# WASM support (optional)
wasm-bindgen = { version = "0.2", optional = true }
tsify = { version = "0.4", optional = true, features = ["js"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
