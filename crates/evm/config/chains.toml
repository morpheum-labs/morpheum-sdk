# Default chain configuration for Morpheum CLI bridge operations.
#
# Override values in your local config at:
#   ~/.config/morpheum/chains.toml
#
# Replace "YOUR_KEY" with your RPC provider API key (Alchemy, Infura, etc.).
# Contract addresses marked "0x..." are placeholders — update with real
# deployment addresses for your environment.

